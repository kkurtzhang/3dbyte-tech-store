services:
  meilisearch:
    container_name: 3dbyte-meilisearch
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  cms:
    container_name: 3dbyte-cms
    image: ${CMS_IMAGE:-3dbytetech/cms:dev-latest}
    restart: unless-stopped
    env_file:
      - ../apps/cms/.env
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=1337
      - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
    ports:
      - "1337:1337"
    volumes:
      - ../apps/cms/public/uploads:/opt/apps/cms/public/uploads
    command: ["node", "/opt/apps/cms/node_modules/@strapi/strapi/bin/strapi.js", "start"]

  backend:
    container_name: 3dbyte-backend
    image: ${BACKEND_IMAGE:-3dbytetech/backend:dev-latest}
    restart: unless-stopped
    depends_on:
      - meilisearch
    env_file:
      - ../apps/backend/.env
    environment:
      - NODE_ENV=production
      - PORT=9000
      - MEDUSA_WORKER_MODE=server
      - DISABLE_MEDUSA_ADMIN=false
      - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL:-https://api-dev.3dbytetech.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"

  worker:
    container_name: 3dbyte-worker
    image: ${BACKEND_IMAGE:-3dbytetech/backend:dev-latest}
    restart: unless-stopped
    depends_on:
      - meilisearch
    env_file:
      - ../apps/backend/.env
    environment:
      - NODE_ENV=production
      - MEDUSA_WORKER_MODE=worker
      - DISABLE_MEDUSA_ADMIN=true
      - MEDUSA_BACKEND_URL=${MEDUSA_BACKEND_URL:-https://api-dev.3dbytetech.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  meilisearch_data:
