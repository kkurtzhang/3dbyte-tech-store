name: build-push-backend-image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag (default: dev-latest)"
        required: false
        default: "dev-latest"
  push:
    branches: ["main"]
    paths:
      - "apps/backend/**"
      - "packages/shared-types/**"
      - "packages/shared-utils/**"
      - "packages/shared-config/**"
      - "docker/backend/Dockerfile.release"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          INPUT_TAG='${{ github.event.inputs.image_tag }}'
          if [ -z "$INPUT_TAG" ]; then INPUT_TAG='dev-latest'; fi
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile.release
          platforms: linux/arm64
          push: true
          tags: |
            3dbytetech/backend:${{ steps.meta.outputs.tag }}
            3dbytetech/backend:${{ steps.meta.outputs.sha_tag }}
