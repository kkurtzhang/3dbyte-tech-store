# command = "npx"
# args = ["-y", "fal-ai-mcp-server"]
#
# [mcp_servers.cloudflare]
# command = "npx"
# args = ["-y", "@cloudflare/mcp-server-cloudflare"]

[features]
# Codex multi-agent support is experimental as of March 2026.
multi_agent = true

# Profiles — switch with `codex -p <name>`
[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"


# Project overlay

# Project-specific Codex overlay for this repo.
# `scripts/sync-ecc-project.sh` appends this to the upstream ECC baseline.

[mcp_servers.meilisearch]
startup_timeout_sec = 20
command = "uvx"
args = ["-n", "meilisearch-mcp"]

[mcp_servers.next-devtools]
startup_timeout_sec = 20
command = "npx"
args = ["-y", "next-devtools-mcp@latest"]

[mcp_servers.chrome-devtools]
startup_timeout_sec = 20
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.serena]
startup_timeout_sec = 20
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex"]

[mcp_servers.medusa]
url = "https://docs.medusajs.com/mcp"

[sandbox_workspace_write]
network_access = true

